<!DOCTYPE html>
<html>
<head>
	<title>Invitation to upload your file</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial, sans-serif; font-size: 16px; line-height: 1.5; color: #ffffff; background-color: #1a242f; padding: 0; margin: 0;">
	<div align="center" style="max-width: 800px; margin: 0 auto; padding: 20px; background-color: #1a242f;">
		<img src="./circle.png" alt="Logo" style="display: block; max-width: 150px; margin: 0 auto; margin-bottom: 20px;">
		<h1 style="font-weight: bold; margin-top: 0; margin-bottom: 20px;">Invitation to upload your file</h1>
		<p style="margin-top: 0; margin-bottom: 20px;">Hello,</p>
		<p style="margin-top: 0; margin-bottom: 20px;">We would like to invite you to upload your necessary files to our portal</p>
		<p style="margin-top: 0; margin-bottom: 20px;">To accept our invitation, please click the button below:</p>
		<p style="margin-top: 0; margin-bottom: 20px;"><a href="<%= url %>" style="display: inline-block; padding: 12px 24px; color: #FFFFFF; background-color: #42566b; font-weight: bold; text-align: center; text-decoration: none; border-radius: 4px;">Accept Invitation</a></p>
		<p style="margin-top: 0; margin-bottom: 20px;">If you have any questions, please don't hesitate to contact us.</p>
		<p style="margin-top: 0; margin-bottom: 20px;">Thank you for considering our service.</p>
	</div>
</body>
</html>
