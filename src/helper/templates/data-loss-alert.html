<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Loss Alert!</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        background-color: #f5f5f5;
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      h1 {
        color: #007bff;
      }

      p {
        margin-bottom: 20px;
      }

      .button {
        display: inline-block;
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        text-align: center;
        text-decoration: none;
        background-color: #9ac4f1;
        color: #fff !important;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <p>We noticed that some data has been lost from pc Database</p>
      <p>Please take necessary actions for that loss.</p>
      <p>Lost Data Details:</p>
      <ul>
        <li>
          <strong>Action:</strong>
          <%= action %>
        </li>
        <li>
          <strong>Collection:</strong>
          <%= collection %>
        </li>
        <li>
          <strong>Data Document ID:</strong>
          <%= data_document_id %>
        </li>
      </ul>
      <a href="support@pc.com" style="text-decoration: none" class="button">Contact Support</a>.
    </div>
  </body>
</html>
